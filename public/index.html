<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<link rel="preload" as="image" href="home.webp" fetchpriority="high">
<title>中财大2026届毕业生晚会 · 预约报名</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #0a1530;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 手机屏幕容器 */
  .phone {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    max-width: 450px;
    margin: 0 auto;
    overflow: hidden;
    background: #0a1530 url(home.webp) no-repeat center / cover;
  }

  /* 背景图 */
  .bg-image {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .bg-image.hidden { opacity: 0; }

  /* 交互层 */
  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* 按钮 */
  .btn-zone {
    position: absolute;
    bottom: 14%;
    left: 50%;
    transform: translateX(-50%);
    width: 65%;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    z-index: 10;
    border: none;
    background: none;
    padding: 0;
  }
  .btn-zone img {
    width: 100%;
    display: block;
  }
  .btn-zone:active {
    transform: translateX(-50%) scale(0.94);
  }
  .btn-zone.hidden {
    display: none;
  }

  /* 加载/结果区 —— 覆盖在 "第" 和 "位" 之间的空白 */
  .result-overlay {
    position: absolute;
    /* 调整这里：top越大越往下，left越大越往右 */
    top: 49.7%;
    left: 32%;
    width: 55%;
    text-align: center;
    z-index: 10;
  }
  .result-number {
    font-size: clamp(28px, 7vw, 56px);
    font-weight: 900;
    color: #f5c842;
    text-shadow: 0 0 30px rgba(245,200,66,0.5);
    line-height: 1;
    animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.3); }
    to { opacity: 1; transform: scale(1); }
  }

  /* 加载动画 */
  .loading-dot {
    display: inline-block;
    width: 20px; height: 20px;
    border: 3px solid rgba(245,200,66,0.3);
    border-top-color: #f5c842;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 彩带 */
  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }
  .confetti-piece {
    position: absolute;
    width: 10px; height: 10px;
    animation: confettiFall var(--fd) linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(var(--r)); opacity: 0; }
  }

  /* 提示文字 */
  .tip {
    position: absolute;
    bottom: 4%;
    width: 100%;
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    z-index: 5;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="phone" id="phone">

  <!-- 背景：首页设计（初始隐藏，JS决定显示哪个） -->
  <img class="bg-image" id="bgBefore" src="home.webp" alt="首页"
       style="opacity:0;">

  <!-- 背景：结果页设计（数字显示状态） -->
  <img class="bg-image" id="bgAfter" src="result.webp" alt="结果"
       style="opacity:0;">

  <!-- 按钮 -->
  <div class="btn-zone" id="btnZone" onclick="handleRegister()">
    <img src="btn-register.webp" alt="立即预约">
  </div>

  <!-- 数字显示区 -->
  <div class="result-overlay" id="resultOverlay"></div>

  <!-- 底部署名 -->
  <div class="tip" id="tipText">点击按钮，生成专属预约编号</div>

</div>

<div class="confetti-container" id="confetti"></div>

<script>
// ========== 报名逻辑 ==========
const API_BASE = '';

function fmt(n) { return String(n).replace(/\B(?=(\d{4})+(?!\d))/g, ','); }

async function handleRegister() {
  const btnZone = document.getElementById('btnZone');
  const resultOverlay = document.getElementById('resultOverlay');
  const tipText = document.getElementById('tipText');
  const bgBefore = document.getElementById('bgBefore');
  const bgAfter = document.getElementById('bgAfter');

  // 已经报名过
  const stored = localStorage.getItem('cufe_gala_number');
  if (stored) {
    showNumber(parseInt(stored));
    return;
  }

  // 首次报名 —— 显示加载
  btnZone.classList.add('hidden');
  bgBefore.style.opacity = '0';
  bgAfter.classList.remove('hidden');
  bgAfter.style.opacity = '1';
  resultOverlay.innerHTML = '<div class="loading-dot"></div>';
  tipText.textContent = '正在生成预约编号...';

  try {
    const r = await fetch('/api/register', { method: 'POST' });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || '请求失败');

    localStorage.setItem('cufe_gala_number', d.number);
    showNumber(d.number);
    launchConfetti();
    tipText.textContent = '截图分享到朋友圈，看看谁排在你前面 😉';
  } catch (e) {
    // 失败：切回首页
    bgAfter.style.opacity = '0';
    bgBefore.style.opacity = '1';
    btnZone.classList.remove('hidden');
    resultOverlay.innerHTML = '';
    tipText.textContent = '网络异常，请重试';
    alert('网络异常，请重试');
  }
}

function showNumber(num) {
  const bgBefore = document.getElementById('bgBefore');
  const bgAfter = document.getElementById('bgAfter');
  const btnZone = document.getElementById('btnZone');
  const resultOverlay = document.getElementById('resultOverlay');
  const tipText = document.getElementById('tipText');

  bgBefore.style.opacity = '0';
  bgAfter.classList.remove('hidden');
  bgAfter.style.opacity = '1';
  btnZone.classList.add('hidden');

  resultOverlay.innerHTML = '<div class="result-number">' + fmt(num) + '</div>';
  tipText.textContent = '截图分享到朋友圈，看看谁排在你前面 😉';
}

// ========== 彩带 ==========
function launchConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#f5c842','#e0a800','#ff6b6b','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#01a3a4','#feca57','#ff6348'];
  let html = '';
  for (let i = 0; i < 60; i++) {
    const br = Math.random() > 0.5 ? '50%' : '2px';
    html += '<div class="confetti-piece" style="left:'+Math.random()*100+'%;width:'+(Math.random()*8+6)+'px;height:'+(Math.random()*8+6)+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';border-radius:'+br+';--fd:'+(Math.random()*2+2)+'s;--r:'+(Math.random()*720-360)+'deg;"></div>';
  }
  container.innerHTML = html;
  setTimeout(() => { container.innerHTML = ''; }, 4000);
}

// ========== 页面加载 ==========
(function () {
  const stored = localStorage.getItem('cufe_gala_number');
  if (stored) {
    // 已经报过名 → 直接显示结果页，首页和按钮永不出现
    showNumber(parseInt(stored));
  } else {
    // 未报名 → 显示首页 + 按钮
    document.getElementById('bgBefore').style.opacity = '1';
    document.getElementById('btnZone').classList.remove('hidden');
  }
})();
</script>

</body>
</html>
